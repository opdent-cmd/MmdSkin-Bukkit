# MmdSkin-Bukkit 配置文件

# 调试选项，用于诊断转发问题。
debug:
  # 总开关
  enabled: false

  # 在控制台中以十六进制打印负载的前 N 个字节。
  # 0 = 禁用
  payloadHexMaxBytes: 0

  # 记录实际收到转发插件消息的每个接收者。
  logRecipients: false

# 模型同步选项
sync:
  # 启用资源同步服务
  enabled: true
  
  # 是否启用 GZIP 压缩
  enableGzip: true

# 安全配置
security:
  # 服务器私密盐，用于生成加密密钥。
  # 如果为空，插件会在首次启动时自动生成，请勿泄露。
  serverSecret: ""
